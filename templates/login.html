<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - Rag Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }
        
        .container {
            max-width: 28rem;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .header h2 {
            font-size: 1.875rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            color: #111827;
            transition: all 0.15s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .form-group input::placeholder {
            color: #9ca3af;
        }
        
        .btn {
            width: 100%;
            padding: 0.5rem 1rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn:hover {
            background: #4f46e5;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
        }
        
        .spinner.show {
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        
        .footer {
            margin-top: 1.5rem;
            text-align: center;
        }
        
        .footer p {
            font-size: 0.75rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>欢迎登录到RAG内容聚合平台</h2>
            <p>请输入您的用户名和密码</p>
        </div>
        
        <div class="card">
            <form id="loginForm">
                <div id="alertDiv" class="alert"></div>
                
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input id="username" name="username" type="text" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input id="password" name="password" type="password" required placeholder="请输入密码">
                </div>

                <div class="form-group">
                    <button type="submit" class="btn">
                        <span id="loginText">登录</span>
                        <span id="loginSpinner" class="spinner"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            const alertDiv = document.getElementById('alertDiv');
            
            // 显示加载状态
            submitBtn.disabled = true;
            loginText.textContent = '登录中...';
            loginSpinner.classList.add('show');
            alertDiv.classList.remove('show');
            
            try {
                const response = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 登录成功，显示成功消息
                    showAlert('登录成功，正在跳转...', 'success');
                    // 延迟跳转，让用户看到成功消息
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    // 显示错误信息
                    showAlert(data.error || '登录失败', 'error');
                }
            } catch (error) {
                console.error('登录错误:', error);
                showAlert('网络错误，请稍后重试', 'error');
            } finally {
                // 恢复按钮状态
                submitBtn.disabled = false;
                loginText.textContent = '登录';
                loginSpinner.classList.remove('show');
            }
        });
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertDiv');
            alertDiv.className = 'alert show';
            
            if (type === 'error') {
                alertDiv.classList.add('alert-error');
            } else {
                alertDiv.classList.add('alert-success');
            }
            
            alertDiv.textContent = message;
        }
        
        // 回车键提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                if (document.activeElement.tagName !== 'BUTTON') {
                    e.preventDefault();
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
